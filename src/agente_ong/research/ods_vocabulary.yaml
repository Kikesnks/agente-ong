# Vocabulario ODS para el investigador (R24).
# Se combina con el vocabulario base de convocatoria de R16 antes de lanzar a Tavily.
# Editable por el desarrollador. Versionado en Git.
# Si este archivo falta o está mal formado, el investigador usa un fallback embebido
# en código (los 5 términos más generales). Ver R24.4.

# Vocabulario universal ONU / Agenda 2030. Aplica a cualquier país u organismo.
ods_generales:
  - "Agenda 2030"
  - "ODS"
  - "Objetivos de Desarrollo Sostenible"
  - "desarrollo sostenible cooperación"

# Vocabulario específico del marco de cooperación española (AECID, Plan Director,
# ayuda oficial al desarrollo 0,7%).
cooperacion_espanola:
  - "Plan Director cooperación española"
  - "subvenciones 0,7%"

# Ejes cruzados obligatorios en convocatorias de cooperación española:
# género, transición ecológica y transición social.
enfoques_transversales:
  - "enfoque de género cooperación"
  - "transición ecológica cooperación"
  - "transición social cooperación"
